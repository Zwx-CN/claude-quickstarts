<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760">
  <rect x="0" y="0" width="1280" height="760" fill="#f1f5f9"/>
  <text x="640" y="58" text-anchor="middle" font-size="34" font-weight="700" fill="#0f172a">OSWorld-V2 执行器增强</text>
  <text x="640" y="92" text-anchor="middle" font-size="18" fill="#475569">V2 更像生产级评测编排器，Qwen 只是可迁移 agent 之一</text>

  <polygon points="130,160 350,160 390,250 350,340 130,340 90,250" fill="#dbeafe" stroke="#2563eb" stroke-width="4"/>
  <text x="240" y="228" text-anchor="middle" font-size="23" font-weight="700" fill="#1e3a8a">多阶段任务</text>
  <text x="240" y="260" text-anchor="middle" font-size="15" fill="#1d4ed8">phase setup</text>
  <text x="240" y="284" text-anchor="middle" font-size="15" fill="#1d4ed8">phase evaluate / gate</text>

  <polygon points="530,160 750,160 790,250 750,340 530,340 490,250" fill="#dcfce7" stroke="#16a34a" stroke-width="4"/>
  <text x="640" y="228" text-anchor="middle" font-size="23" font-weight="700" fill="#14532d">用户模拟器</text>
  <text x="640" y="260" text-anchor="middle" font-size="15" fill="#166534">agent 无动作时</text>
  <text x="640" y="284" text-anchor="middle" font-size="15" fill="#166534">记录 ASK_USER</text>

  <polygon points="930,160 1150,160 1190,250 1150,340 930,340 890,250" fill="#fee2e2" stroke="#dc2626" stroke-width="4"/>
  <text x="1040" y="228" text-anchor="middle" font-size="23" font-weight="700" fill="#7f1d1d">Checkpoint Eval</text>
  <text x="1040" y="260" text-anchor="middle" font-size="15" fill="#991b1b">指定 step 中间评分</text>
  <text x="1040" y="284" text-anchor="middle" font-size="15" fill="#991b1b">写 checkpoint_results</text>

  <rect x="170" y="455" width="260" height="120" rx="24" fill="#fef9c3" stroke="#ca8a04" stroke-width="4"/>
  <text x="300" y="500" text-anchor="middle" font-size="23" font-weight="700" fill="#713f12">Memory Tracing</text>
  <text x="300" y="532" text-anchor="middle" font-size="15" fill="#854d0e">CPU / memory / network</text>

  <rect x="510" y="455" width="260" height="120" rx="24" fill="#ede9fe" stroke="#7c3aed" stroke-width="4"/>
  <text x="640" y="500" text-anchor="middle" font-size="23" font-weight="700" fill="#4c1d95">结构化结果</text>
  <text x="640" y="532" text-anchor="middle" font-size="15" fill="#5b21b6">result.json / phase_results</text>

  <rect x="850" y="455" width="260" height="120" rx="24" fill="#ccfbf1" stroke="#0d9488" stroke-width="4"/>
  <text x="980" y="500" text-anchor="middle" font-size="23" font-weight="700" fill="#134e4a">Agent 迁移</text>
  <text x="980" y="532" text-anchor="middle" font-size="15" fill="#115e59">适配 constructor / action / obs</text>

  <polyline points="390,250 490,250" fill="none" stroke="#334155" stroke-width="4"/>
  <polyline points="790,250 890,250" fill="none" stroke="#334155" stroke-width="4"/>
  <polyline points="1040,340 1040,405 980,405 980,455" fill="none" stroke="#334155" stroke-width="4"/>
  <polyline points="640,340 640,455" fill="none" stroke="#334155" stroke-width="4"/>
  <polyline points="240,340 240,405 300,405 300,455" fill="none" stroke="#334155" stroke-width="4"/>
</svg>
